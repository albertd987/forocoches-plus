name: Tweet on Release

on:
  release:
    types: [published]

jobs:
  tweet:
    runs-on: ubuntu-latest
    steps:
      - name: Tweet new release
        uses: twitter-together/action@v1
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        with:
          tweet: |
            🚀 Forocoches+ ${{ github.event.release.tag_name }} ya disponible

            Filtra usuarios, bloquea anuncios y recibe notificaciones de MPs.

            Descarga: ${{ github.event.release.html_url }}

            #Forocoches #Android
